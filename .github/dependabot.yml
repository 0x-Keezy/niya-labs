# Dependabot config — keeps npm deps + GitHub Actions up to date.
# Two ecosystems (root Next.js app + the Chrome extension) each get their
# own schedule. PRs are grouped by minor/patch to avoid noise.

version: 2

updates:
  # Root Next.js app
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "root"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Chrome extension (isolated package)
  - package-ecosystem: "npm"
    directory: "/extension"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "extension"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci"
